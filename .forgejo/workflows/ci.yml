name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: debian-runner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Install dependencies
        run: cd backend && go mod download

      - name: Run tests
        run: |
          export CGO_ENABLED=1
          cd backend && go test -v ./...

  backend-lint:
    runs-on: debian-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend

  frontend:
    runs-on: debian-runner
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install --no-frozen-lockfile

      - name: Lint
        run: cd frontend && pnpm run lint

      - name: Typecheck
        run: |
          cd frontend
          pnpm exec react-router typegen
          pnpm exec tsc

  docker-build:
    runs-on: debian-runner
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --no-cache -t ownpocket .

